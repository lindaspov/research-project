<!DOCTYPE html>
<html>
<head>
    <title>Reverse e-Auction</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e6e6e6;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .subline {
            color: #555;
            margin-bottom: 30px;
        }

        input[type="text"], select {
            padding: 12px;
            width: 100%;
            max-width: 350px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
        }

        button {
            padding: 12px 22px;
            background-color: #0f7d42;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0c6033;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Reverse e-Auction Experiment</h1>

    <div class="subline">
        Please enter your details to begin the experiment
    </div>

    <form method="POST">

        <!-- NAME -->
        <label for="name">Your Name</label>
        <input
            type="text"
            id="name"
            name="player_name"
            placeholder="Enter your name"
            required
        >

        <!-- GENDER -->
        <label for="gender">Gender</label>
        <select name="gender" id="gender" required>
            <option value="">Select your gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
        </select>

        <!-- BUTTON -->
        <button type="submit">
            Start Experiment
        </button>

    </form>

</div>

</body>
</html>
