<!DOCTYPE html>
<html>
<head>
    <title>Access</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f2f2f2;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 100px;
        }

        h1 {
            color: #1a7f37;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 85%;
            padding: 12px;
            background: #1a7f37;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #146c2e;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="emoji">🔒</div>

        <h1>Auction Experiment</h1>
        <p>Please enter your access code to continue</p>

        <form method="POST">
            <input type="password" name="code" placeholder="Access code" required>
            <br>
            <button type="submit">Enter</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

    </div>
</div>

</body>
</html>
