<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f2f2f2;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 100px;
        }

        h1 {
            color: #1a7f37;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .highlight {
            font-weight: bold;
            color: #1a7f37;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="emoji">🎉</div>

        <h1>Thank you for participating!</h1>

        <p>You have successfully completed all <span class="highlight">25 rounds</span>.</p>

        <p>Your decisions have been recorded.</p>

        <p>We really appreciate your time 🙌</p>

        <p style="margin-top:20px; font-size:16px; color:#555;">
            You can now close this page.
        </p>

    </div>
</div>

</body>
</html>
